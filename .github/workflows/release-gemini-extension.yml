name: Release Gemini Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create/use (example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

  

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: gemini-extension/package-lock.json

      - name: Install dependencies
        working-directory: gemini-extension
        run: npm ci

      - name: Build extension
        working-directory: gemini-extension
        run: npm run build

      - name: Package extension assets
        working-directory: gemini-extension
        run: npm run package:all

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: |
            gemini-extension/release/darwin.arm64.strm-mapping.tar.gz
            gemini-extension/release/linux.x64.strm-mapping.tar.gz
            gemini-extension/release/win32.x64.strm-mapping.zip
