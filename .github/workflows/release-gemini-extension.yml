name: Release Gemini Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create/use (example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

  

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure release tag exists (manual runs)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists on origin."
          else
            echo "Creating and pushing tag ${RELEASE_TAG} at ${GITHUB_SHA}"
            git tag "${RELEASE_TAG}" "${GITHUB_SHA}"
            git push origin "refs/tags/${RELEASE_TAG}"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: gemini-extension/package-lock.json

      - name: Install dependencies
        working-directory: gemini-extension
        run: npm ci

      - name: Build extension
        working-directory: gemini-extension
        run: npm run build

      - name: Package extension assets
        working-directory: gemini-extension
        run: npm run package:all

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          files: |
            gemini-extension/release/darwin.arm64.strm-mapping.tar.gz
            gemini-extension/release/linux.x64.strm-mapping.tar.gz
            gemini-extension/release/win32.x64.strm-mapping.zip
